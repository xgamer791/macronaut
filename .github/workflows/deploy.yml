name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npm run export:web
        env:
          EXPO_PUBLIC_BASE_PATH: /macronaut

      # GitHub Pages CDN caches HTML for ~10 minutes; meta tags do not override
      # that. Write version.json and inject a tiny client script that detects a
      # new build and navigates with ?_build=… so stale tabs pick up Daily Goals
      # / Fat Goal / etc. immediately.
      - name: Publish build version + force-refresh stale clients
        run: python3 scripts/patch-pages-cachebust.py

      - name: Disable Jekyll so _expo assets are served
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
